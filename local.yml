---
- name: Set up CachyOS workstation system packages and services
  hosts: localhost
  connection: local
  become: true

  vars:
    user_name: "lonewolf"
    user_home: "/home/lonewolf"
    chezmoi_repo: "https://github.com/ablonewolf/system-config.git"

  tasks:
    - name: Update pacman cache
      community.general.pacman:
        update_cache: true

    - name: Install packages required before everything else
      community.general.pacman:
        name:
          - git
          - base-devel
          - curl
          - wget
          - openssh
          - ca-certificates
          - flatpak
          - chezmoi
          - adwaita-cursors
          - paru
        state: present

    - name: Install official packages from manifest
      community.general.pacman:
        name: "{{ lookup('file', 'pkglist-official.txt').splitlines() }}"
        state: present

    - name: Make Adwaita cursor visible in KDE System Settings
      ansible.builtin.lineinfile:
        path: /usr/share/icons/Adwaita/index.theme
        regexp: "^Hidden="
        line: "Hidden=false"

    - name: Enable Docker if installed
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      failed_when: false

    - name: Add user to docker group if docker group exists
      ansible.builtin.user:
        name: "{{ user_name }}"
        groups: docker
        append: true
      failed_when: false

    - name: Enable cronie if installed
      ansible.builtin.systemd:
        name: cronie
        enabled: true
        state: started
      failed_when: false

    - name: Initialize PostgreSQL database if missing
      ansible.builtin.shell: |
        set -euo pipefail
        if [ ! -f /var/lib/postgres/data/PG_VERSION ]; then
          sudo -u postgres initdb -D /var/lib/postgres/data
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Enable PostgreSQL service
      ansible.builtin.systemd:
        name: postgresql
        enabled: true
        state: started
      failed_when: false

    - name: Set postgres database user password
      ansible.builtin.shell: |
        set -euo pipefail
        sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false


- name: Set up CachyOS workstation user packages, themes, and dotfiles
  hosts: localhost
  connection: local
  become: false

  vars:
    user_name: "lonewolf"
    user_home: "/home/lonewolf"
    chezmoi_repo: "https://github.com/ablonewolf/system-config.git"
    theme_source_dir: "/home/lonewolf/theme-sources"

  vars_files:
    - themes.yml

  tasks:
    - name: Install yay
      community.general.pacman:
        name: yay
        state: present

    - name: Install AUR packages from manifest using yay
      become: false
      ansible.builtin.shell: |
        set -euo pipefail
        yay -S --needed --noconfirm --answerclean None --answerdiff None $(cat pkglist-aur.txt)
      args:
        executable: /bin/bash
        chdir: "{{ playbook_dir }}"
      when:
        - not ansible_check_mode
        - lookup('file', 'pkglist-aur.txt') | trim | length > 0
      changed_when: false

    - name: Ensure Flathub exists
      ansible.builtin.command:
        cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      changed_when: false

    - name: Install Flatpak apps from manifest
      ansible.builtin.shell: |
        set -euo pipefail
        while read -r app; do
          [ -z "$app" ] && continue
          flatpak install -y flathub "$app"
        done < pkglist-flatpak.txt
      args:
        executable: /bin/bash
        chdir: "{{ playbook_dir }}"
      when:
        - not ansible_check_mode
        - lookup('file', 'pkglist-flatpak.txt') | trim | length > 0
      changed_when: false

    - name: Create theme source directory
      ansible.builtin.file:
        path: "{{ theme_source_dir }}"
        state: directory
        mode: "0755"

    - name: Clone KDE theme repositories
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ theme_source_dir }}/{{ item.dest }}"
        version: "{{ item.version | default('HEAD') }}"
        update: true
      loop: "{{ themes }}"

    - name: Install KDE themes
      ansible.builtin.shell: |
        set -euo pipefail
        {{ item.install_command }}
      args:
        chdir: "{{ theme_source_dir }}/{{ item.dest }}"
        executable: /bin/bash
      loop: "{{ themes }}"
      when: not ansible_check_mode
      changed_when: false

    - name: Install SDKMAN if missing
      ansible.builtin.shell: |
        set -euo pipefail
        curl -s "https://get.sdkman.io" | bash
      args:
        executable: /bin/bash
        creates: "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
      when: not ansible_check_mode

    - name: Initialize chezmoi repo if missing
      ansible.builtin.shell: |
        set -euo pipefail
        chezmoi init "{{ chezmoi_repo }}"
      args:
        executable: /bin/bash
        creates: "{{ user_home }}/.local/share/chezmoi/.git"

    - name: Apply chezmoi dotfiles
      ansible.builtin.command:
        cmd: chezmoi apply
      changed_when: false
      when: not ansible_check_mode

    - name: Final message
      ansible.builtin.debug:
        msg:
          - "Setup completed."
          - "Log out and log back in so Docker group membership, shell paths,"
          - "KDE themes, cursor settings, PostgreSQL, and Plasma settings fully apply."
